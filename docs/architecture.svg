<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
<title>ZavetSec DLP Architecture</title>
<desc>Windows agents ship events and screenshots to a central server. The server stores data in SQLite and on disk, serves a web dashboard, and sends Telegram alerts.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#7b8499" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #c9d1e0; }
.th  { font-size: 13px; font-weight: 600; }
.ts  { font-size: 11px; fill: #7b8499; }
.box-blue   { fill: #102030; stroke: #1a4060; stroke-width: 0.5; }
.box-teal   { fill: #0f2020; stroke: #0f5030; stroke-width: 0.5; }
.box-purple { fill: #1e1535; stroke: #4a2a9a; stroke-width: 0.5; }
.box-gray   { fill: #1a1a1a; stroke: #3a3a3a; stroke-width: 0.5; }
.arr        { fill: none; stroke: #4a5068; stroke-width: 1.2; }
.arr-dashed { fill: none; stroke: #4a5068; stroke-width: 1; stroke-dasharray: 4 3; }
.legend-dot { rx: 2; ry: 2; width: 10; height: 10; }
</style>
</defs>

<!-- SERVER container -->
<rect class="box-teal" x="390" y="30" width="258" height="360" rx="14"/>
<text class="th" x="519" y="57" text-anchor="middle">Server</text>
<text class="ts" x="519" y="72" text-anchor="middle">Windows / Linux</text>

<rect class="box-teal" x="410" y="88" width="218" height="50" rx="8"/>
<text class="th" x="519" y="110" text-anchor="middle">ASP.NET Core 8</text>
<text class="ts" x="519" y="126" text-anchor="middle">HTTP :5000 · HTTPS :5001</text>

<rect class="box-teal" x="410" y="156" width="100" height="44" rx="8"/>
<text class="th" x="460" y="176" text-anchor="middle">SQLite</text>
<text class="ts" x="460" y="190" text-anchor="middle">events.db</text>

<rect class="box-teal" x="528" y="156" width="100" height="44" rx="8"/>
<text class="th" x="578" y="176" text-anchor="middle">Screenshots</text>
<text class="ts" x="578" y="190" text-anchor="middle">ServerScreenshots/</text>

<rect class="box-purple" x="410" y="220" width="218" height="50" rx="8"/>
<text class="th" x="519" y="242" text-anchor="middle">Web Dashboard</text>
<text class="ts" x="519" y="258" text-anchor="middle">EN/RU · 5 tabs · roles</text>

<rect class="box-teal" x="410" y="290" width="218" height="44" rx="8"/>
<text class="th" x="519" y="310" text-anchor="middle">Telegram Alerts</text>
<text class="ts" x="519" y="324" text-anchor="middle">configurable modules</text>

<text class="ts" x="519" y="370" text-anchor="middle">HTTPS · brute force · rate limiting</text>
<text class="ts" x="519" y="384" text-anchor="middle">PBKDF2 auth · schema migrations</text>

<!-- AGENT 1 -->
<rect class="box-blue" x="20" y="30" width="230" height="220" rx="14"/>
<text class="th" x="135" y="56" text-anchor="middle">Windows Agent</text>
<text class="ts" x="135" y="72" text-anchor="middle">ZavetSecDlpAgent.exe</text>

<rect class="box-blue" x="38" y="88" width="96" height="36" rx="6"/>
<text class="th" x="86" y="104" text-anchor="middle">Keylogger</text>
<text class="ts" x="86" y="118" text-anchor="middle">WH_KEYBOARD_LL</text>

<rect class="box-blue" x="144" y="88" width="96" height="36" rx="6"/>
<text class="th" x="192" y="104" text-anchor="middle">Screenshots</text>
<text class="ts" x="192" y="118" text-anchor="middle">interval + window</text>

<rect class="box-blue" x="38" y="136" width="96" height="36" rx="6"/>
<text class="th" x="86" y="152" text-anchor="middle">Clipboard</text>
<text class="ts" x="86" y="166" text-anchor="middle">sensitive words</text>

<rect class="box-blue" x="144" y="136" width="96" height="36" rx="6"/>
<text class="th" x="192" y="152" text-anchor="middle">USB / Files</text>
<text class="ts" x="192" y="166" text-anchor="middle">WMI + FSWatcher</text>

<rect class="box-blue" x="38" y="184" width="96" height="36" rx="6"/>
<text class="th" x="86" y="200" text-anchor="middle">Network</text>
<text class="ts" x="86" y="214" text-anchor="middle">TCP + DNS</text>

<rect class="box-blue" x="144" y="184" width="96" height="36" rx="6"/>
<text class="th" x="192" y="200" text-anchor="middle">Processes</text>
<text class="ts" x="192" y="214" text-anchor="middle">launch + alerts</text>

<!-- Shippers -->
<rect class="box-gray" x="20" y="268" width="110" height="70" rx="10"/>
<text class="th" x="75" y="290" text-anchor="middle">LogShipper</text>
<text class="ts" x="75" y="306" text-anchor="middle">batched events</text>
<text class="ts" x="75" y="320" text-anchor="middle">50MB disk buffer</text>

<rect class="box-gray" x="140" y="268" width="110" height="70" rx="10"/>
<text class="th" x="195" y="290" text-anchor="middle">SS Shipper</text>
<text class="ts" x="195" y="306" text-anchor="middle">upload + decrypt</text>
<text class="ts" x="195" y="320" text-anchor="middle">delete after upload</text>

<text class="ts" x="135" y="360" text-anchor="middle">AES-256-CBC logs · DPAPI key</text>

<!-- Agent 2 -->
<rect class="box-blue" x="20" y="390" width="230" height="70" rx="14"/>
<text class="th" x="135" y="416" text-anchor="middle">Agent #2 … #N</text>
<text class="ts" x="135" y="432" text-anchor="middle">same components</text>
<text class="ts" x="135" y="448" text-anchor="middle">mass deploy via deploy.ps1</text>

<!-- Arrows -->
<path class="arr" d="M250 178 L388 170" marker-end="url(#arrow)" opacity="0.8"/>
<text class="ts" x="318" y="162" text-anchor="middle">events</text>
<path class="arr-dashed" d="M388 192 L250 200" marker-end="url(#arrow)" opacity="0.7"/>
<text class="ts" x="318" y="210" text-anchor="middle">commands</text>

<path class="arr" d="M250 303 L388 210" marker-end="url(#arrow)" opacity="0.5"/>
<path class="arr" d="M250 420 L388 230" marker-end="url(#arrow)" opacity="0.35"/>

<!-- Browser -->
<rect class="box-purple" x="390" y="415" width="258" height="55" rx="10"/>
<text class="th" x="519" y="438" text-anchor="middle">Admin Browser</text>
<text class="ts" x="519" y="454" text-anchor="middle">https://server:5001</text>
<path class="arr" d="M519 415 L519 392" marker-end="url(#arrow)" opacity="0.7"/>

<!-- Legend -->
<rect class="legend-dot" fill="#1a4060" stroke="#4a9eff" stroke-width="0.5" x="20" y="500"/>
<text class="ts" x="36" y="510">Agent</text>
<rect class="legend-dot" fill="#0f5030" stroke="#3ecf8e" stroke-width="0.5" x="90" y="500"/>
<text class="ts" x="106" y="510">Server</text>
<rect class="legend-dot" fill="#4a2a9a" stroke="#bd93f9" stroke-width="0.5" x="160" y="500"/>
<text class="ts" x="176" y="510">Dashboard / Browser</text>
<rect class="legend-dot" fill="#3a3a3a" stroke="#7b8499" stroke-width="0.5" x="296" y="500"/>
<text class="ts" x="312" y="510">Transport</text>
</svg>
