<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZavetSec DLP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--bg2:#181c27;--bg3:#1e2333;--border:#2a2f45;--text:#c9d1e0;--text2:#7b8499;--text3:#4a5068;--blue:#4a9eff;--green:#3ecf8e;--red:#ff5555;--yellow:#ffb86c;--cyan:#8be9fd;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px}
.login-page{display:none;min-height:100vh;align-items:center;justify-content:center}
.login-page.active{display:flex}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:40px;width:360px}
.login-box h1{font-size:20px;font-weight:700;color:#fff;margin-bottom:6px}
.login-box .sub{color:var(--text2);font-size:13px;margin-bottom:28px}
.login-box label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.login-box input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:9px 12px;font-size:14px;outline:none;margin-bottom:16px}
.login-box input:focus{border-color:var(--blue)}
.login-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:6px;padding:10px;font-size:14px;font-weight:600;cursor:pointer}
.login-btn:hover{filter:brightness(1.15)}.login-btn:disabled{opacity:.5;cursor:default}
.login-error{color:var(--red);font-size:13px;margin-top:10px;text-align:center;min-height:20px}
#app{display:none}#app.active{display:block}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px}
.header h1{font-size:17px;font-weight:600;color:#fff}.header h1 span{color:var(--blue)}
.hright{margin-left:auto;display:flex;align-items:center;gap:12px}
.auto-refresh{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.auto-refresh input{accent-color:var(--blue)}
.lang-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:3px 10px;font-size:12px;cursor:pointer;font-weight:600;letter-spacing:.5px}
.lang-btn:hover{border-color:var(--blue);color:var(--blue)}
.status-indicator{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.user-info{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);padding:4px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:20px}
.user-info .uname{color:var(--text);font-weight:500}.user-info .urole{color:var(--yellow);font-size:11px}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer}
.logout-btn:hover{border-color:var(--red);color:var(--red)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.stat-card .label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:6px}
.stat-card .value{font-size:24px;font-weight:700;color:#fff}
.stat-card .sub{font-size:11px;color:var(--text3);margin-top:3px}
.stat-card.alert-card{border-color:#7a2020;background:#2a1a1a}
.stat-card.alert-card .value{color:var(--red)}
.disk-bar{padding:0 24px 12px;display:flex;gap:20px;font-size:12px;color:var(--text3)}
.disk-bar span{display:flex;align-items:center;gap:5px}.disk-bar b{color:var(--text2)}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 24px;background:var(--bg2)}
.tab{padding:10px 20px;cursor:pointer;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s}
.tab:hover{color:var(--text)}.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.tab-content{display:none}.tab-content.active{display:block}
.filters{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.filters select,.filters input{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 9px;font-size:13px;outline:none}
.filters select:focus,.filters input:focus{border-color:var(--blue)}
.filters input[type=text]{width:200px}
.btn{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:5px 14px;font-size:13px;cursor:pointer;font-weight:500;transition:filter .1s}
.btn:hover{filter:brightness(1.15)}.btn:disabled{opacity:.4;cursor:default;filter:none}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--text2);color:var(--text)}
.btn-red{background:#7a2020;color:#ffaaaa;border:none}.btn-red:hover{background:#9a2020}
.btn-yellow{background:#4a3010;color:#ffb86c;border:none}.btn-yellow:hover{background:#6a4010}
.btn-green{background:#0f3020;color:var(--green);border:1px solid #1a6040}.btn-green:hover{background:#1a4030}
.btn-sm{padding:3px 10px;font-size:12px}
.count-label{margin-left:auto;color:var(--text3);font-size:12px}
.table-wrap{padding:0 24px 24px;overflow-x:auto}
.events-table{width:100%;border-collapse:collapse;margin-top:10px}
.events-table th{background:var(--bg2);color:var(--text2);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.7px;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.events-table td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.events-table tr:hover td{background:var(--bg2)}
.ts-cell{white-space:nowrap;color:var(--text2);font-size:12px}
.host-cell{white-space:nowrap;color:var(--cyan);font-weight:500}
.user-cell{white-space:nowrap;color:var(--text2);font-size:12px}
.data-cell{color:var(--text3);font-size:12px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.data-cell:hover{white-space:normal;word-break:break-all;color:var(--text2)}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.3px;white-space:nowrap}
.badge-alert{background:#3a1515;color:#ff6b6b;border:1px solid #7a2020}
.badge-key{background:#1e1535;color:#bd93f9;border:1px solid #4a2a9a}
.badge-clip{background:#1a2535;color:#8be9fd;border:1px solid #1a5070}
.badge-ss{background:#102030;color:#4a9eff;border:1px solid #1a4060}
.badge-net{background:#0f2020;color:#3ecf8e;border:1px solid #0f5030}
.badge-usb{background:#2a2010;color:#ffb86c;border:1px solid #6a4010}
.badge-file{background:#251a10;color:#ffb86c;border:1px solid #5a3010}
.badge-proc{background:#201520;color:#ff79c6;border:1px solid #6a1560}
.badge-service{background:#1a1a1a;color:#7b8499;border:1px solid #3a3a3a}
.ss-toolbar{padding:10px 24px 0;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ss-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;padding:12px 24px 24px}
.ss-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .15s;position:relative}
.ss-card:hover{border-color:var(--blue)}.ss-card.selected{border-color:var(--blue);box-shadow:0 0 0 2px rgba(74,158,255,.3)}
.ss-check{position:absolute;top:8px;left:8px;z-index:10;display:none;width:20px;height:20px;cursor:pointer;accent-color:var(--blue)}
.select-mode .ss-check{display:block}.select-mode .ss-card{cursor:default}
.select-mode .ss-card:hover{border-color:var(--border)}.select-mode .ss-card.selected{border-color:var(--blue)}
.ss-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--bg3)}
.ss-info{padding:10px 12px}
.ss-info-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.ss-host{color:var(--cyan);font-weight:500;font-size:13px}
.ss-proc{color:var(--yellow);font-size:11px;font-weight:600;background:#2a2000;padding:1px 6px;border-radius:3px}
.ss-meta{color:var(--text2);font-size:11px;margin-top:2px}
.ss-window{color:var(--text3);font-size:11px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.agent-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;overflow:hidden}
.agent-card.online{border-color:#1a4030}
.agent-header{padding:14px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.agent-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.agent-dot.online{background:var(--green);box-shadow:0 0 6px var(--green)}
.agent-dot.stopped{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
.agent-dot.offline{background:var(--text3)}
.agent-host{font-size:15px;font-weight:600;color:#fff}
.agent-actions{display:flex;gap:8px;margin-left:16px;flex-wrap:wrap}
.agent-body{border-top:1px solid var(--border);padding:12px 18px;display:none}
.agent-body.open{display:block}
.cmd-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.cmd-row:last-child{border-bottom:none}
.cmd-name{color:var(--text);font-weight:500;min-width:100px}
.cmd-ts{color:var(--text3);min-width:160px}.cmd-status{min-width:80px}
.cmd-err{color:var(--red);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.broadcast-panel{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:16px}
.broadcast-panel h3{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.broadcast-actions{display:flex;gap:8px;flex-wrap:wrap}
.cs-pending{color:var(--yellow)}.cs-delivered{color:var(--blue)}.cs-executed{color:var(--green)}.cs-error{color:var(--red)}
.kl-wrap{padding:16px 24px}
.kl-session{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.kl-header{padding:10px 14px;display:flex;gap:12px;align-items:center;cursor:pointer}
.kl-header:hover{background:var(--bg3)}
.kl-host{color:var(--cyan);font-weight:500}
.kl-win{color:var(--text2);font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kl-ts{color:var(--text3);font-size:11px;white-space:nowrap}
.kl-body{padding:12px 14px;font-family:'Courier New',monospace;font-size:13px;line-height:1.8;color:var(--text);word-break:break-all;display:none}
.kl-body.open{display:block}
.kl-tag{color:var(--yellow)}.kl-highlight{background:#3a2a00;color:#ffcc44;border-radius:2px;padding:0 1px}
.mgmt-wrap{padding:16px 24px}
.user-table-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px}
.user-table-card table{width:100%;border-collapse:collapse}
.user-table-card th{background:var(--bg3);color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.7px;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
.user-table-card td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.user-table-card tr:last-child td{border-bottom:none}.user-table-card tr:hover td{background:var(--bg3)}
.role-admin{color:var(--yellow);background:#2a2000;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.role-viewer{color:var(--text2);background:var(--bg3);padding:2px 8px;border-radius:4px;font-size:11px}
.form-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.form-card h3{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--text)}
.form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.form-field input,.form-field select{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-size:13px;outline:none;min-width:150px}
.form-field input:focus,.form-field select:focus{border-color:var(--blue)}
.tg-section{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.tg-section h3{font-size:14px;font-weight:600;margin-bottom:8px;color:var(--text)}
.tg-section p{color:var(--text2);font-size:13px;margin-bottom:12px;line-height:1.5}
.tg-status{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;border-radius:20px;margin-bottom:12px}
.tg-status.enabled{background:#0f3020;color:var(--green);border:1px solid #1a6040}
.tg-status.disabled{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal.open{display:flex}
.modal-inner{position:relative;max-width:95vw;max-height:95vh;display:flex;flex-direction:column;border-radius:6px;overflow:hidden}
.modal img{max-width:100%;max-height:82vh;display:block;object-fit:contain}
.modal-close{position:absolute;top:-14px;right:-14px;background:var(--red);color:#fff;border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10}
.modal-footer{background:rgba(15,17,23,.97);padding:12px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-shrink:0}
.modal-meta{color:var(--text);font-size:12px;white-space:pre-line;line-height:1.7;flex:1}
.modal-del-btn{background:#7a2020;color:#ffaaaa;border:none;border-radius:6px;padding:7px 16px;font-size:13px;cursor:pointer;white-space:nowrap;align-self:center;flex-shrink:0}
.modal-del-btn:hover{background:#9a2020}
.force-pw-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:5000;align-items:center;justify-content:center}
.force-pw-overlay.open{display:flex}
.force-pw-box{background:var(--bg2);border:2px solid var(--yellow);border-radius:12px;padding:32px;max-width:400px;width:100%}
.force-pw-box h2{font-size:18px;font-weight:700;color:var(--yellow);margin-bottom:8px}
.force-pw-box p{color:var(--text2);font-size:13px;margin-bottom:20px;line-height:1.5}
.force-pw-box label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.force-pw-box input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:9px 12px;font-size:14px;outline:none;margin-bottom:14px}
.force-pw-box input:focus{border-color:var(--yellow)}
.force-pw-hint{font-size:11px;color:var(--text3);margin-bottom:12px}
.force-pw-error{color:var(--red);font-size:13px;margin-bottom:12px;min-height:18px}
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;align-items:center;justify-content:center}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:24px;max-width:400px;width:100%;text-align:center}
.confirm-box h3{font-size:16px;margin-bottom:10px;color:#fff}
.confirm-box p{color:var(--text2);font-size:13px;margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:10px;justify-content:center}
.pagination{display:flex;align-items:center;gap:10px;margin-top:12px;justify-content:center;color:var(--text2);font-size:13px;padding-bottom:16px}
.pagination button{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 12px;cursor:pointer}
.pagination button:disabled{opacity:.35;cursor:default}
.pagination button:not(:disabled):hover{border-color:var(--blue);color:var(--blue)}
.loading,.empty{text-align:center;padding:40px;color:var(--text3)}
.loader{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 18px;font-size:13px;color:var(--text);z-index:3000;animation:fadeIn .2s ease;box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:400px}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="login-page active" id="loginPage">
  <div class="login-box">
    <h1>ZavetSec <span style="color:var(--blue)">DLP</span></h1>
    <div class="sub" data-i18n="login.subtitle"></div>
    <label data-i18n="login.username"></label>
    <input type="text" id="loginUsername" autocomplete="username">
    <label data-i18n="login.password"></label>
    <input type="password" id="loginPassword" autocomplete="current-password">
    <button class="login-btn" id="loginBtn" onclick="doLogin()" data-i18n="login.submit"></button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="force-pw-overlay" id="forcePwOverlay">
  <div class="force-pw-box">
    <h2 data-i18n="forcePw.title"></h2>
    <p data-i18n="forcePw.desc"></p>
    <label data-i18n="forcePw.current"></label>
    <input type="password" id="forcePwOld">
    <label data-i18n="forcePw.new"></label>
    <input type="password" id="forcePwNew">
    <label data-i18n="forcePw.repeat"></label>
    <input type="password" id="forcePwNew2">
    <div class="force-pw-hint" data-i18n="forcePw.hint"></div>
    <div class="force-pw-error" id="forcePwError"></div>
    <button class="btn" style="width:100%;padding:10px;font-size:14px" onclick="doForcePwChange()" data-i18n="forcePw.submit"></button>
  </div>
</div>

<div id="app">
<div class="header">
  <h1>ZavetSec <span>DLP</span></h1>
  <div class="hright">
    <label class="auto-refresh"><input type="checkbox" id="autoRefresh" checked><span data-i18n="header.autoRefresh"></span></label>
    <button id="liveModeBtn" class="btn btn-sm" style="margin-left:6px;padding:2px 8px;font-size:11px;background:var(--bg3);border:1px solid var(--border)" onclick="toggleLiveMode()" title="Live feed — poll every 5s">&#9679; Live</button>
    <button class="lang-btn" id="langBtn" onclick="toggleLanguage()">EN</button>
    <div class="status-indicator"><span class="dot" id="statusDot"></span><span id="statusText" data-i18n="health.checking"></span></div>
    <div class="user-info"><span class="uname" id="headerUsername">-</span><span class="urole" id="headerRole"></span></div>
    <button class="logout-btn" onclick="doLogout()" data-i18n="header.logout"></button>
  </div>
</div>

<div class="stats">
  <div class="stat-card"><div class="label" data-i18n="stats.totalEvents"></div><div class="value" id="sTotal">-</div></div>
  <div class="stat-card alert-card"><div class="label" data-i18n="stats.alertsToday"></div><div class="value" id="sAlerts">-</div></div>
  <div class="stat-card"><div class="label" data-i18n="stats.activeHosts"></div><div class="value" id="sHosts">-</div><div class="sub" data-i18n="stats.last24h"></div></div>
  <div class="stat-card"><div class="label" data-i18n="stats.lastEvent"></div><div class="value" style="font-size:14px;padding-top:6px" id="sLast">-</div></div>
</div>
<div class="disk-bar" id="diskBar" style="display:none">
  <span><span data-i18n="stats.db"></span> <b id="diskDb">-</b></span>
  <span><span data-i18n="stats.screenshots"></span> <b id="diskSs">-</b></span>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('events',this)" data-i18n="tab.events"></div>
  <div class="tab" onclick="switchTab('screenshots',this)" data-i18n="tab.screenshots"></div>
  <div class="tab" onclick="switchTab('keylogger',this)" data-i18n="tab.keylogger"></div>
  <div class="tab" onclick="switchTab('agents',this)" data-i18n="tab.agents"></div>
  <div class="tab" id="tabMgmt" style="display:none" onclick="switchTab('management',this)" data-i18n="tab.management"></div>
  <div class="tab" id="tabAudit" style="display:none" onclick="switchTab('audit',this)" data-i18n="tab.audit"></div>
  <div class="tab" id="tabAudit" style="display:none" onclick="switchTab('audit',this)" data-i18n="tab.audit"></div>
  <div class="tab" id="tabAudit" style="display:none" onclick="switchTab('audit',this)" data-i18n="tab.audit"></div>
</div>

<!-- EVENTS -->
<div class="tab-content active" id="tab-events">
  <div class="filters">

// ── i18n Engine ───────────────────────────────────────────────────────────
let currentLang = localStorage.getItem('dlp_lang') || 'en';

function t(key, vars){
  const v = LANG[currentLang] || LANG['en'];
  let s = v[key] || LANG['en'][key] || key;
  if(vars) Object.keys(vars).forEach(k => s = s.replace(new RegExp('{'+k+'}','g'), vars[k]));
  return s;
}

function applyTranslations(){
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.textContent = t(key);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
  });
  // Update dynamic placeholders
  const fSearch = document.getElementById('fSearch');
  if(fSearch) fSearch.placeholder = t('filter.search');
  const ssSearch = document.getElementById('ssSearch');
  if(ssSearch) ssSearch.placeholder = t('filter.searchWindow');
  const klSearch = document.getElementById('klSearch');
  if(klSearch) klSearch.placeholder = t('filter.searchKeys');
  const newUsername = document.getElementById('newUsername');
  if(newUsername) newUsername.placeholder = t('mgmt.loginLabel');
  const newPassword = document.getElementById('newPassword');
  if(newPassword) newPassword.placeholder = 'min. 12 chars';
  // Update first option in selects
  ['fModule','fHost','ssHost','klHost'].forEach(id => {
    const sel = document.getElementById(id);
    if(sel && sel.options.length > 0){
      const first = sel.options[0];
      const key = first.getAttribute('data-i18n');
      if(key) first.textContent = t(key);
    }
  });
  // Update broadcast buttons if visible
  buildBroadcastButtons();
  buildDataDelButtons();
  // Update lang button
  const lb = document.getElementById('langBtn');
  if(lb) lb.textContent = currentLang.toUpperCase() === 'EN' ? 'RU' : 'EN';
  document.title = 'ZavetSec DLP';
}

async function doLogin(){
  const btn=document.getElementById('loginBtn'),err=document.getElementById('loginError');
  const u=document.getElementById('loginUsername').value.trim(),p=document.getElementById('loginPassword').value;
  err.textContent='';
  if(!u||!p){err.textContent=t('err.fillFields');return;}
  btn.disabled=true;btn.textContent=t('login.submitting');
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(r.status===429){
      let secs=d.retryAfter||900;
      const countdown=setInterval(()=>{
        secs--;
        if(secs<=0){clearInterval(countdown);err.textContent=t('login.tryAgain');btn.disabled=false;btn.textContent=t('login.submit');return;}
        err.textContent=t('login.blocked',{m:Math.floor(secs/60),s:secs%60});
      },1000);
      err.textContent=t('login.blocked',{m:Math.floor(secs/60),s:secs%60});
      return;
    }
    if(!r.ok){err.textContent=d.error||t('login.error');return;}
    authToken=d.token;currentUser={username:d.username,role:d.role};
    localStorage.setItem('dlp_token',authToken);
    if(d.mustChangePassword){
      document.getElementById('loginPage').classList.remove('active');
      document.getElementById('forcePwOverlay').classList.add('open');
    } else showApp();
  }catch{err.textContent=t('login.serverError');}
  finally{btn.disabled=false;btn.textContent=t('login.submit');}
}

async function doForcePwChange(){
  const old=document.getElementById('forcePwOld').value,
        np=document.getElementById('forcePwNew').value,
        np2=document.getElementById('forcePwNew2').value;
  const err=document.getElementById('forcePwError');err.textContent='';
  if(np!==np2){err.textContent=t('err.passwordMismatch');return;}
  const pe=validatePassword(np);if(pe){err.textContent=pe;return;}
  try{
    const r=await authFetch('/api/auth/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({oldPassword:old,newPassword:np})});
    const d=await r.json();if(!r.ok){err.textContent=d.error||'Error';return;}
    document.getElementById('forcePwOverlay').classList.remove('open');
    showApp();showToast(t('toast.passwordChangedSuccess'),'success');
  }catch(e){err.textContent=e.message;}
}

async function tryRestoreSession(){
  const token=localStorage.getItem('dlp_token');if(!token)return;
  authToken=token;
  try{
    const r=await fetch('/api/auth/me',{headers:{'Authorization':'Bearer '+token}});
    if(r.ok){const me=await r.json();if(me&&me.username){currentUser={username:me.username,role:me.role};showApp();return;}}
  }catch{}
  localStorage.removeItem('dlp_token');authToken='';
}

async function authFetch(url,opts={}){
  opts.headers=opts.headers||{};opts.headers['Authorization']='Bearer '+authToken;
  const r=await fetch(url,opts);
  if(r.status===401){showToast(t('toast.sessionExpired'),'error');setTimeout(doLogout,2000);throw new Error('Session expired');}
  return r;
}

async function fetchJ(url){
  const r=await authFetch(url);
  if(r.status===404)throw new Error(t('error.notFound'));
  if(r.status===429)throw new Error(t('error.rateLimit'));
  if(r.status===500)throw new Error(t('error.server'));
  if(!r.ok)throw new Error('Error '+r.status);
  return r.json();
}

// ── Helpers ───────────────────────────────────────────────────────────────
function localTime(ts){if(!ts)return'-';try{return new Date(ts).toLocaleString(currentLang==='ru'?'ru-RU':'en-GB',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});}catch{return ts;}}
function fmtBytes(b){if(!b)return'0 B';if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';if(b<1073741824)return(b/1048576).toFixed(1)+' MB';return(b/1073741824).toFixed(2)+' GB';}
function extractProcess(w){if(!w)return'';const m=w.match(/\[([^\]]+)\s+PID:\d+\]/);return m?m[1]:'';}
function extractTitle(w){if(!w)return w;return w.replace(/\s*\[[^\]]+\s+PID:\d+\]\s*$/,'').trim();}
function h(s){return(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(n){return Number(n).toLocaleString();}
function shortUser(u){const p=(u||'').split('\\');return p[p.length-1];}
function setStatus(ok){document.getElementById('statusDot').style.background=ok?'var(--green)':'var(--red)';document.getElementById('statusText').textContent=ok?t('status.online'):t('status.offline');}
function badge(m){const u=m.toUpperCase();if(u.includes('ALERT')||u.includes('ERROR'))return'badge-alert';if(u.startsWith('KEYLOGGER'))return'badge-key';if(u.startsWith('CLIPBOARD'))return'badge-clip';if(u.startsWith('SCREENSHOT'))return'badge-ss';if(u.startsWith('NETWORK')||u.startsWith('DNS'))return'badge-net';if(u.startsWith('USB'))return'badge-usb';if(u.startsWith('FILE'))return'badge-file';if(u.startsWith('PROCESS'))return'badge-proc';return'badge-service';}
function renderPag(pfx,offset,total,limit){
  const pg=Math.floor(offset/limit)+1,pgs=Math.max(1,Math.ceil(total/limit));
  const pageEl=document.getElementById(pfx+'Page');
  if(pageEl)pageEl.textContent=t('pag.prev').includes('\u2190')?
    'p. '+pg+' / '+pgs : pg+' / '+pgs;
  document.getElementById(pfx+'Page').textContent=pg+' / '+pgs;
  document.getElementById(pfx+'Prev').disabled=offset<=0;
  document.getElementById(pfx+'Next').disabled=offset+limit>=total;
}
function showToast(msg,type){const el=document.createElement('div');el.className='toast '+(type||'');el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),4500);}
function statusBadge(s){return{pending:{cls:'cs-pending',label:'pending'},delivered:{cls:'cs-delivered',label:'delivered'},executed:{cls:'cs-executed',label:'executed'},error:{cls:'cs-error',label:'error'}}[s]||{cls:'',label:s};}
function val(id){return document.getElementById(id).value||'';}

function validatePassword(pw){
  if(pw.length<12)return t('err.passwordTooShort');
  if(!/[A-Z]/.test(pw))return t('err.passwordNoUpper');
  if(!/[a-z]/.test(pw))return t('err.passwordNoLower');
  if(!/[0-9]/.test(pw))return t('err.passwordNoDigit');
  if(!/[^A-Za-z0-9]/.test(pw))return t('err.passwordNoSpecial');
  return null;
}

async function exportCsv(){
  const p=new URLSearchParams({module:val('fModule'),host:val('fHost'),from:val('fFrom'),to:val('fTo'),search:val('fSearch')});
  const btn=document.getElementById('csvBtn');
  const orig=btn?btn.textContent:'CSV';
  try{
    if(btn){btn.disabled=true;btn.textContent='...';}
    showToast(t('toast.csvLoading'),'');
    const r=await authFetch('/api/export/events.csv?'+p);
    if(!r.ok)throw new Error(await r.text());
    const reader=r.body.getReader();const chunks=[];let received=0;
    while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);received+=value.length;if(btn)btn.textContent=Math.round(received/1024)+' KB';}
    const blob=new Blob(chunks,{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url;a.download='dlp-events-'+new Date().toISOString().slice(0,10)+'.csv';
    a.click();URL.revokeObjectURL(url);
    showToast(t('toast.csvDownloaded',{size:Math.round(blob.size/1024)}),'success');
  }catch(e){showToast(t('toast.csvLoading')+': '+e.message,'error');}
  finally{if(btn){btn.disabled=false;btn.textContent=orig;}}
}

    const frag=document.createDocumentFragment();

      chk.checked=selectedSsIds.has(s.id);chk.onchange=function(){onCheckChange(s.id,this.checked);};chk.onclick=function(ev){ev.stopPropagation();};
      const img=document.createElement('img');img.className='ss-thumb';img.loading='lazy';img.alt='';
      img.src='/api/screenshots/'+s.id+'/image';img.onerror=function(){this.style.display='none';};
      const info=document.createElement('div');info.className='ss-info';
      const top=document.createElement('div');top.className='ss-info-top';
      const hs=document.createElement('span');hs.className='ss-host';hs.textContent=s.host||'';top.appendChild(hs);

    });

}

async function loadKeylogger(){
  const st=val('klSearch');
  const p=new URLSearchParams({module:'KEYLOGGER',limit:KL_LIMIT,offset:klOffset,host:val('klHost'),from:val('klFrom'),to:val('klTo'),search:st});
  const wrap=document.getElementById('klWrap');wrap.innerHTML='<div class="loading"><span class="loader"></span>'+t('events.loading')+'</div>';
  try{
    const data=await fetchJ('/api/events?'+p);klTotal=data.total;
    document.getElementById('klCount').textContent=t('kl.sessions')+' '+fmt(klTotal);
    if(!data.events.length){wrap.innerHTML='<div class="empty">'+t('kl.noData')+'</div>';renderPag('kl',klOffset,klTotal,KL_LIMIT);return;}
    wrap.innerHTML=data.events.map((ev,i)=>{
      const ts=localTime(ev.ts),d=ev.data||'',wm=d.match(/window=([^|]*)/),km=d.match(/keys=([\s\S]*)/);
      const win=wm?wm[1]:'',keys=km?km[1]:d;
      let kh=h(keys).replace(/\[([A-Z+<>^v\-]+)\]/g,'<span class="kl-tag">[$1]</span>');
      if(st){const re=new RegExp('('+st.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');kh=kh.replace(re,'<span class="kl-highlight">$1</span>');}
      return `<div class="kl-session"><div class="kl-header" onclick="toggleKl(${i})"><span class="kl-host">${h(ev.host)}</span><span class="kl-win">${h(shortUser(ev.user))} \xb7 ${h(win)}</span><span class="kl-ts">${ts}</span></div><div class="kl-body ${st?'open':''}" id="kl-${i}">${kh}</div></div>`;
    }).join('');
    renderPag('kl',klOffset,klTotal,KL_LIMIT);
  }catch(e){wrap.innerHTML='<div class="empty" style="color:var(--red)">'+e.message+'</div>';}
}
function toggleKl(i){document.getElementById('kl-'+i).classList.toggle('open');}
function klPrevPage(){if(klOffset>=KL_LIMIT){klOffset-=KL_LIMIT;loadKeylogger();}}
function klNextPage(){if(klOffset+KL_LIMIT<klTotal){klOffset+=KL_LIMIT;loadKeylogger();}}
function resetKlFilter(){['klHost','klFrom','klTo','klSearch'].forEach(id=>document.getElementById(id).value='');klOffset=0;loadKeylogger();}

function agentsPrevPage(){if(agentsOffset>=AGENTS_LIMIT){agentsOffset-=AGENTS_LIMIT;loadAgents();}}

async function loadAgents(){
  const list=document.getElementById('agentsList');
  const pag=document.getElementById('agentsPag');
  const isAdmin=currentUser.role==='admin';
  try{
    const [allAgents,cmds]=await Promise.all([fetchJ('/api/agents'),fetchJ('/api/commands/history?limit=200')]);
    agentsTotal=allAgents.length;
    const agents=allAgents.slice(agentsOffset,agentsOffset+AGENTS_LIMIT);
    if(!allAgents.length){list.innerHTML='<div class="empty">'+t('agents.noAgents')+'</div>';if(pag)pag.style.display='none';return;}
    if(pag){
      pag.style.display=agentsTotal>AGENTS_LIMIT?'flex':'none';
      document.getElementById('agentsPage').textContent=(Math.floor(agentsOffset/AGENTS_LIMIT)+1)+' / '+Math.max(1,Math.ceil(agentsTotal/AGENTS_LIMIT));
      document.getElementById('agentsPrev').disabled=agentsOffset<=0;
      document.getElementById('agentsNext').disabled=agentsOffset+AGENTS_LIMIT>=agentsTotal;
    }
    list.innerHTML='';
    agents.forEach((a,i)=>{
      const onl=a.online,lastSeen=localTime(a.lastSeen);
      const hostCmds=cmds.filter(c=>c.host===a.host||c.host==='*').slice(0,5);
      const card=document.createElement('div');card.className='agent-card'+(onl?' online':'');
      const stopped = onl && (a.monitorStatus||a.MonitorStatus)==='stopped';
      const dotClass = onl ? (stopped ? 'stopped' : 'online') : 'offline';
      const dot=document.createElement('span');dot.className='agent-dot '+dotClass;
      const nameDiv=document.createElement('div');
      const hostDiv=document.createElement('div');hostDiv.className='agent-host';hostDiv.textContent=a.host||'';
      const cntDiv=document.createElement('div');cntDiv.style.cssText='color:var(--text2);font-size:11px;margin-top:2px';
      cntDiv.textContent=fmt(a.events)+' '+t('agents.events');
      if(a.agentId||a.AgentId){
        const idDiv=document.createElement('div');idDiv.style.cssText='color:var(--text3);font-size:10px;margin-top:1px;font-family:monospace';
        idDiv.textContent='id: '+(a.agentId||a.AgentId);
        nameDiv.appendChild(idDiv);
      }
      nameDiv.appendChild(hostDiv);nameDiv.appendChild(cntDiv);
      const metaDiv=document.createElement('div');metaDiv.style.cssText='color:var(--text2);font-size:12px;margin-left:auto;text-align:right';
      const stDiv=document.createElement('div');
      stDiv.innerHTML=onl?'<span style="color:var(--green)">\u25cf '+t('agents.online')+'</span>':'<span style="color:var(--text3)">\u25cf '+t('agents.offline')+'</span>';
      const lsDiv=document.createElement('div');lsDiv.style.marginTop='2px';lsDiv.textContent=t('agents.lastSeen')+' '+lastSeen;
      metaDiv.appendChild(stDiv);metaDiv.appendChild(lsDiv);
      const actDiv=document.createElement('div');actDiv.className='agent-actions';
      function mkBtn(cls,label,fn){const b=document.createElement('button');b.className='btn '+cls+' btn-sm';b.textContent=label;b.onclick=fn;return b;}
      if(isAdmin){
        if(onl){
          actDiv.appendChild(mkBtn('btn-yellow',t('btn.restart'),()=>confirmCmd(a.host,'restart',t('confirm.restartAgent'),t('confirm.restartAgentDesc'),a.agentId||a.AgentId)));
          actDiv.appendChild(mkBtn('btn-ghost',t('btn.stop'),()=>confirmCmd(a.host,'stop',t('confirm.stopAgent'),t('confirm.stopAgentDesc'),a.agentId||a.AgentId)));
          actDiv.appendChild(mkBtn('btn-red',t('btn.uninstall'),()=>confirmCmd(a.host,'uninstall',t('confirm.uninstallAgent'),t('confirm.uninstallAgentDesc'),a.agentId||a.AgentId)));
        }else{
          actDiv.appendChild(mkBtn('btn-green',t('btn.start'),()=>confirmCmd(a.host,'start',t('confirm.startAgent'),t('confirm.startAgentDesc'),a.agentId||a.AgentId)));
          actDiv.appendChild(mkBtn('btn-ghost',t('btn.restart'),()=>confirmCmd(a.host,'restart',t('confirm.restartAgent'),'',a.agentId||a.AgentId)));
          actDiv.appendChild(mkBtn('btn-red',t('btn.uninstall'),()=>confirmCmd(a.host,'uninstall',t('confirm.uninstallAgent'),t('confirm.uninstallAgentDesc'),a.agentId||a.AgentId)));
          actDiv.appendChild(mkBtn('btn-ghost','\ud83d\uddd1 '+t('btn.fromList'),()=>removeAgentFromList(a.host, a.agentId||a.AgentId||'')));
        }
        actDiv.appendChild(mkBtn('btn-ghost','\ud83d\udcf7 '+t('btn.screenshots'),()=>confirmDataDelete('host-screenshots',t('data.deleteSs')+' '+a.host,t('data.deleteSsDesc'),a.host)));
        actDiv.appendChild(mkBtn('btn-ghost','\ud83d\udccb '+t('btn.events'),()=>confirmDataDelete('host-events',t('data.deleteEv')+' '+a.host,t('data.deleteEvDesc'),a.host)));
      }
      const histBtn=mkBtn('btn-ghost',t('agents.history')+' \u25be',()=>document.getElementById('ab-'+i).classList.toggle('open'));
      actDiv.appendChild(histBtn);
      const header=document.createElement('div');header.className='agent-header';
      header.appendChild(dot);header.appendChild(nameDiv);header.appendChild(metaDiv);header.appendChild(actDiv);
      const body=document.createElement('div');body.className='agent-body';body.id='ab-'+i;
      const cmdTitle=document.createElement('div');cmdTitle.style.cssText='font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px';
      cmdTitle.textContent=t('agents.lastCommands');
      body.appendChild(cmdTitle);
      if(hostCmds.length){
        hostCmds.forEach(c=>{
          const st=statusBadge(c.status);
          const row=document.createElement('div');row.className='cmd-row';
          row.innerHTML='<span class="cmd-name">'+h(c.command)+'</span><span class="cmd-ts">'+localTime(c.createdAt)+'</span><span class="cmd-status '+st.cls+'">'+st.label+'</span>'+(c.error?'<span class="cmd-err">'+h(c.error)+'</span>':'');
          body.appendChild(row);
        });
      }else{const nd=document.createElement('div');nd.style.cssText='color:var(--text3);font-size:12px';nd.textContent=t('agents.noCommands');body.appendChild(nd);}
      card.appendChild(header);card.appendChild(body);list.appendChild(card);
    });
  }catch(e){list.innerHTML='<div class="empty" style="color:var(--red)">'+e.message+'</div>';}
}

function confirmCmd(host,cmd,title,desc,agentId){
  pendingCmd={host,cmd,agentId:agentId||''};
  document.getElementById('confirmTitle').textContent=title;
  document.getElementById('confirmDesc').textContent=desc;
  document.getElementById('confirmOkBtn').onclick=doConfirmedCmd;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('open');pendingCmd={host:'',cmd:''};pendingDataDelete={type:'',host:''};document.getElementById('confirmOkBtn').onclick=doConfirmedCmd;}
async function doConfirmedCmd(){
  const {host,cmd}=pendingCmd;closeConfirm();
  try{const r=await authFetch('/api/commands',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({host,command:cmd,payload:'',agentId:host==='*'?'':pendingCmd.agentId||''})});
    if(!r.ok)throw new Error(await r.text());const d=await r.json();showToast(t('toast.commandSent',{cmd,id:d.id}),'success');setTimeout(loadAgents,1000);}
  catch(e){showToast(e.message,'error');}
}
async function removeAgentFromList(host, agentId){
  if(!confirm(t('toast.agentRemoved',{host})))return;
  try{
    const url='/api/agents/'+encodeURIComponent(host)+(agentId?'?agentId='+encodeURIComponent(agentId):'');
    const r=await authFetch(url,{method:'DELETE'});
    if(!r.ok)throw new Error(await r.text());
    showToast(t('toast.agentRemoved',{host}),'success');loadAgents();
  }
  catch(e){showToast(e.message,'error');}
}
function confirmDataDelete(type,title,desc,host){
  host=host||'';pendingDataDelete={type,host};
  document.getElementById('confirmTitle').textContent=title;
  document.getElementById('confirmDesc').textContent=desc;
  document.getElementById('confirmOkBtn').onclick=doDataDelete;
  document.getElementById('confirmOverlay').classList.add('open');
}
async function doDataDelete(){
  const {type,host}=pendingDataDelete;closeConfirm();
  const urls={'all-screenshots':'/api/data/all/screenshots','all-events':'/api/data/all/events',
    'host-screenshots':'/api/data/'+encodeURIComponent(host)+'/screenshots',
    'host-events':'/api/data/'+encodeURIComponent(host)+'/events'};
  const labels={'all-screenshots':t('data.allScreenshots'),'all-events':t('data.allEvents'),
    'host-screenshots':t('btn.screenshots')+' '+host,'host-events':t('btn.events')+' '+host};
  if(!urls[type])return;
  try{const r=await authFetch(urls[type],{method:'DELETE'});if(!r.ok)throw new Error(await r.text());
    const d=await r.json(),count=d.deleted||d.deletedEvents||d.deletedScreenshots||0;
    showToast(t('toast.dataDeleted',{label:labels[type],count}),'success');
    if(type.includes('screenshot')&&document.getElementById('tab-screenshots').classList.contains('active'))loadScreenshots();
    loadStats();
    if(type.includes('event')&&document.getElementById('tab-events').classList.contains('active'))loadEvents();
  }catch(e){showToast(e.message,'error');}
}

    const r=await authFetch('/api/telegram/test');
    if(r.ok){el.textContent=t('mgmt.tgConfigured');el.className='tg-status enabled';}
    else{const d=await r.json();el.textContent=d.error||t('mgmt.tgNotConfigured');el.className='tg-status disabled';}
  }catch{}
  try{
    const r2=await authFetch('/api/telegram/config');
    if(r2.ok){const cfg=await r2.json();
      if(modsEl){
        if(cfg.sendAllAlerts)modsEl.textContent=t('mgmt.tgAllAlerts');
        else if(cfg.alertModules&&cfg.alertModules.length)modsEl.textContent=cfg.alertModules.join(', ');
        else modsEl.textContent=t('mgmt.tgNotSet');
      }
    }
  }catch{}
}
async function testTelegram(){
  try{const r=await authFetch('/api/telegram/test');const d=await r.json();
    if(r.ok)showToast(t('toast.tgTestSent'),'success');else showToast(d.error,'error');}
  catch(e){showToast(e.message,'error');}
}

// ── Audit Log ─────────────────────────────────────────────────────────────
let auditOffset=0,auditTotal=0;
const AUDIT_LIMIT=100;

function auditBadge(action){
  if(!action)return'';
  const a=action.toUpperCase();
  let style='background:#1a1a1a;color:#7b8499;border:1px solid #3a3a3a';
  if(a.includes('LOGIN')&&!a.includes('LOGOUT'))style='background:#0f3020;color:#3ecf8e;border:1px solid #1a6040';
  else if(a.includes('LOGOUT'))style='background:#1a1a1a;color:#4a5068;border:1px solid #3a3a3a';
  else if(a.includes('PASSWORD'))style='background:#1e1535;color:#bd93f9;border:1px solid #4a2a9a';
  else if(a.includes('CREATE'))style='background:#102030;color:#4a9eff;border:1px solid #1a4060';
  else if(a.includes('DELETE')||a.includes('UNINSTALL'))style='background:#3a1515;color:#ff6b6b;border:1px solid #7a2020';
  else if(a.includes('COMMAND')||a.includes('STOP'))style='background:#2a2010;color:#ffb86c;border:1px solid #6a4010';
  return '<span class="badge" style="'+style+'">'+h(action)+'</span>';
}
async function loadAuditLog(){
  const search=val('auditSearch');
  const body=document.getElementById('auditBody');
  body.innerHTML='<tr><td colspan="6" class="loading"><span class="loader"></span>'+t('events.loading')+'</td></tr>';
  try{
    const p=new URLSearchParams({limit:AUDIT_LIMIT,offset:auditOffset});
    if(search)p.set('search',search);
    const data=await fetchJ('/api/audit?'+p);
    const entries=data.entries||data;
    const total=data.total||entries.length;
    auditTotal=total;
    document.getElementById('auditCount').textContent=t('filter.found')+' '+total;
    if(!entries.length){body.innerHTML='<tr><td colspan="6" class="empty">'+t('audit.noData')+'</td></tr>';return;}
    body.innerHTML=entries.map(e=>`<tr>
      <td class="ts-cell">${localTime(e.ts)}</td>
      <td style="color:var(--cyan);font-weight:500">${h(e.admin||e.username||'')}</td>
      <td style="color:var(--text3);font-size:12px;font-family:monospace">${h(e.ip||'')}</td>
      <td>${auditBadge(e.action)}</td>
      <td style="color:var(--text2);font-size:12px">${h(e.target||'')}</td>
      <td class="data-cell" title="${h(e.detail||'')}">${h(e.detail||'')}</td>
    </tr>`).join('');
    const pg=Math.floor(auditOffset/AUDIT_LIMIT)+1,pgs=Math.max(1,Math.ceil(total/AUDIT_LIMIT));
    document.getElementById('auditPage').textContent=pg+' / '+pgs;
    document.getElementById('auditPrev').disabled=auditOffset<=0;
    document.getElementById('auditNext').disabled=auditOffset+AUDIT_LIMIT>=total;
  }catch(e){body.innerHTML='<tr><td colspan="6" class="empty" style="color:var(--red)">'+e.message+'</td></tr>';}
}

function auditPrevPage(){if(auditOffset>=AUDIT_LIMIT){auditOffset-=AUDIT_LIMIT;loadAuditLog();}}
function auditNextPage(){if(auditOffset+AUDIT_LIMIT<auditTotal){auditOffset+=AUDIT_LIMIT;loadAuditLog();}}

document.getElementById('autoRefresh').addEventListener('change',e=>{clearInterval(timer);if(e.target.checked)startTimer();});
function startTimer(){
  timer=setInterval(()=>{
    loadStats();loadHosts();
    if(document.getElementById('tab-events').classList.contains('active'))loadEvents();
    if(document.getElementById('tab-screenshots').classList.contains('active'))loadScreenshots();
    if(document.getElementById('tab-agents').classList.contains('active'))loadAgents();
  },30000);
}

// ── Init ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  applyTranslations();

  // Enter in login
  document.getElementById('loginPassword').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  document.getElementById('loginUsername').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginPassword').focus();});
  document.getElementById('forcePwNew2').addEventListener('keydown',e=>{if(e.key==='Enter')doForcePwChange();});

  // Enter and change in all filter inputs
  const applyMap={
    fSearch:()=>{evOffset=0;loadEvents();},
    fFrom:()=>{evOffset=0;loadEvents();},fTo:()=>{evOffset=0;loadEvents();},
    ssSearch:()=>{ssOffset=0;loadScreenshots();},
    ssFrom:()=>{ssOffset=0;loadScreenshots();},ssTo:()=>{ssOffset=0;loadScreenshots();},
    klSearch:()=>{klOffset=0;loadKeylogger();},
    klFrom:()=>{klOffset=0;loadKeylogger();},klTo:()=>{klOffset=0;loadKeylogger();}
  };
  Object.entries(applyMap).forEach(([id,fn])=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.addEventListener('keydown',e=>{if(e.key==='Enter')fn();});
    el.addEventListener('change',fn); // date pickers apply on change
  });

  // Auto-apply dropdowns
  document.getElementById('fModule').addEventListener('change',()=>{evOffset=0;loadEvents();});
  document.getElementById('fHost').addEventListener('change',()=>{evOffset=0;loadEvents();});
  document.getElementById('ssHost').addEventListener('change',()=>{ssOffset=0;loadScreenshots();});
  document.getElementById('klHost').addEventListener('change',()=>{klOffset=0;loadKeylogger();});

  // Pagination buttons translation
  ['evPrev','evNext','ssPrev','ssNext','klPrev','klNext','agentsPrev','agentsNext'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    if(id.includes('Prev'))el.setAttribute('data-i18n','pag.prev');
    else el.setAttribute('data-i18n','pag.next');
  });

  tryRestoreSession();
});
